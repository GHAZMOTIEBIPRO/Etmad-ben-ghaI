name: Supabase Migrations

on:
  push:
    branches: [main]
    paths:
      - "supabase/migrations/**"
      - ".github/workflows/supabase-migrations.yml"
  workflow_dispatch:

concurrency:
  group: supabase-production-migrations
  cancel-in-progress: false

jobs:
  migrate:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
      SUPABASE_PROJECT_ID: ${{ secrets.SUPABASE_PROJECT_ID }}
    steps:
      - uses: actions/checkout@v4

      - name: Check Supabase migration credentials
        id: credentials
        shell: bash
        run: |
          if [[ -n "$SUPABASE_ACCESS_TOKEN" && -n "$SUPABASE_DB_PASSWORD" && -n "$SUPABASE_PROJECT_ID" ]]; then
            echo "configured=true" >> "$GITHUB_OUTPUT"
          else
            echo "configured=false" >> "$GITHUB_OUTPUT"
            echo "::warning::Supabase migration secrets are not configured. Add SUPABASE_ACCESS_TOKEN, SUPABASE_DB_PASSWORD, and SUPABASE_PROJECT_ID as GitHub Actions secrets to enable automatic production migrations."
          fi

      - uses: supabase/setup-cli@v1
        if: steps.credentials.outputs.configured == 'true'
        with:
          version: latest

      - name: Link production Supabase project
        if: steps.credentials.outputs.configured == 'true'
        run: supabase link --project-ref "$SUPABASE_PROJECT_ID" --password "$SUPABASE_DB_PASSWORD"

      - name: Preview pending migrations
        if: steps.credentials.outputs.configured == 'true'
        run: supabase db push --linked --password "$SUPABASE_DB_PASSWORD" --dry-run

      - name: Apply pending migrations
        if: steps.credentials.outputs.configured == 'true'
        run: supabase db push --linked --password "$SUPABASE_DB_PASSWORD"
