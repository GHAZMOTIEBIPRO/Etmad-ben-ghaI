name: Deploy Vercel Production

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: vercel-production
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
    steps:
      - uses: actions/checkout@v4

      - name: Check Vercel deployment secrets
        id: secrets
        shell: bash
        run: |
          if [ -n "$VERCEL_TOKEN" ] && [ -n "$VERCEL_ORG_ID" ] && [ -n "$VERCEL_PROJECT_ID" ]; then
            echo "ready=true" >> "$GITHUB_OUTPUT"
          else
            echo "ready=false" >> "$GITHUB_OUTPUT"
            echo "::warning::Vercel deployment secrets are not configured. Native Vercel Git integration, if connected, may still deploy main automatically."
          fi

      - uses: actions/setup-node@v4
        if: steps.secrets.outputs.ready == 'true'
        with:
          node-version: 22

      - name: Install Vercel CLI
        if: steps.secrets.outputs.ready == 'true'
        run: npm install --global vercel@latest

      - name: Pull production environment
        if: steps.secrets.outputs.ready == 'true'
        run: vercel pull --yes --environment=production --token="$VERCEL_TOKEN"

      - name: Build production deployment
        if: steps.secrets.outputs.ready == 'true'
        run: vercel build --prod --token="$VERCEL_TOKEN"

      - name: Deploy to production
        if: steps.secrets.outputs.ready == 'true'
        run: vercel deploy --prebuilt --prod --token="$VERCEL_TOKEN"
